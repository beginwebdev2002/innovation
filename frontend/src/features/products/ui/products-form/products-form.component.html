<div class="bg-gray-100 p-4 rounded mb-8">
    <h2 class="text-xl font-bold mb-4">
      {{ mode() === 'edit' ? 'Редактировать товар' : 'Добавить новый товар' }}
    </h2>
    <div class="grid grid-cols-2 gap-4">
      <input [formField]="productForm.name" placeholder="Название" class="border p-2 rounded" />
      <input [formField]="productForm.category" placeholder="Категория" class="border p-2 rounded" />
      <input [formField]="productForm.description" placeholder="Описание" class="border p-2 rounded col-span-2" />
      <input [formField]="productForm.price" type="number" placeholder="Цена" class="border p-2 rounded" />

      <div class="flex flex-col gap-2">
        <label class="text-sm text-gray-600">Изображение товара</label>
        <input type="file" accept="image/*"  (change)="onFileSelected($event)" class="border p-2 rounded text-sm" />
        @if (productFormModel().imageUrl) {
          <img [src]="productFormModel().imageUrl" alt="Preview" class="w-24 h-24 object-cover rounded border" />
        }
      </div>
    </div>

    <div class="mt-4 flex gap-3">
      <button (click)="saveProduct()" [disabled]="productForm().invalid()" 
      class="
      bg-blue-500 text-white px-6 py-2 rounded hover:bg-blue-600
      disabled:bg-gray-400 disabled:cursor-not-allowed
      disabled:opacity-50
      disabled:hover:bg-gray-400
      "
      >
        {{ mode() === 'edit' ? 'Сохранить изменения' : 'Добавить товар' }}
      </button>
      @if (mode() === 'edit') {
        <button (click)="cancelEdit()" class="bg-gray-400 text-white px-6 py-2 rounded hover:bg-gray-500">
          Отмена
        </button>
      }
    </div>
</div>
