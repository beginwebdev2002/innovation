<div class="flex items-center justify-center min-h-[80vh]">
  <div class="bg-white p-8 rounded shadow-md w-96 text-black">
    <h2 class="text-2xl font-bold mb-4">Вход</h2>
    <form (submit)="onSubmit()" (keydown.enter)="onSubmit()">
      <div class="mb-4">
        <label class="block mb-1">Email</label>
        <input type="email" [formField]="signinForm.email" class="w-full border p-2 rounded" />
      </div>
      <div class="mb-4">
        <label class="block mb-1">Пароль</label>
        <input type="password" [formField]="signinForm.password" class="w-full border p-2 rounded" />
      </div>
      <button type="submit" (click)="onSubmit()" [disabled]="signinForm().invalid()" class="
      w-full bg-blue-500 text-white p-2 rounded hover:bg-blue-600
      disabled:bg-gray-400 disabled:hover:bg-gray-400 disabled:cursor-not-allowed disabled:opacity-50
      ">
        Войти
      </button>
    </form>
    <div class="mt-4 text-center">
      <p class="text-sm">Нет аккаунта? <a routerLink="/signup" class="text-blue-500 hover:underline">Регистрация</a></p>
    </div>
  </div>
</div>
