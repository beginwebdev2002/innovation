<div class="flex items-center justify-center min-h-[80vh]">
  <div class="bg-white p-8 rounded shadow-md w-96 text-black">
    <h2 class="text-2xl font-bold mb-4">Регистрация</h2>
    <form (submit)="onSubmit()" (keydown.enter)="onSubmit()">
      <div class="mb-4">
        <label class="block mb-1">Email</label>
        <input type="email" [formField]="signupForm.email" class="w-full border p-2 rounded" />
        @if(signupForm.email().touched()) {
          <div class="error">
            @for (error of signupForm.email().errors(); track error.kind) {
              <span class="text-red-500 text-sm">{{ error.message }}</span>
            }
          </div>
        }
      </div>
      <div class="mb-4">
        <label class="block mb-1">Пароль</label>
        <input type="password" [formField]="signupForm.password" class="w-full border p-2 rounded" />
        @if(signupForm.password().touched()) {
          <div class="error">
            @for (error of signupForm.password().errors(); track error.kind) {
              <span class="text-red-500 text-sm">{{ error.message }}</span>
            }
          </div>
        }
      </div>
      <button type="submit" (click)="onSubmit()" [disabled]="signupForm().invalid()" class="
      w-full bg-green-500 text-white p-2 rounded hover:bg-green-600
      disabled:bg-gray-400 disabled:hover:bg-gray-400 disabled:cursor-not-allowed disabled:opacity-50
      ">
        Зарегистрироваться
      </button>
    </form>
    <div class="mt-4 text-center">
      <p class="text-sm">Уже есть аккаунт? <a routerLink="/signin" class="text-blue-500 hover:underline">Войти</a></p>
    </div>
  </div>
</div>
