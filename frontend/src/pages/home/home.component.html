<div class="p-8 text-black">
  <h1 class="text-3xl font-bold mb-6">Каталог товаров</h1>

  <div class="flex gap-4 mb-6">
    <input type="text" placeholder="Поиск по названию..." [value]="search()" (input)="updateSearch($event)" class="border p-2 rounded" />
    <button (click)="loadProducts()" class="bg-gray-200 px-4 py-2 rounded hover:bg-gray-300">Найти</button>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-6">
    @for (product of products(); track product.id) {
      <div class="border rounded-lg shadow hover:shadow-lg transition flex flex-col overflow-hidden">
        @if (product.imageUrl) {
          <img [src]="apiUrl() + product.imageUrl" [alt]="product.name" class="w-full h-48 object-cover" />
        } @else {
          <div class="w-full h-48 bg-gray-100 flex items-center justify-center text-gray-400">Нет фото</div>
        }
        <div class="p-4 flex flex-col flex-grow">
          <h3 class="font-bold text-lg">{{product.name}}</h3>
          @if (product.category) {
            <span class="text-xs text-gray-500 mb-1">{{product.category}}</span>
          }
          <p class="text-gray-600 flex-grow text-sm">{{product.description}}</p>
          <p class="text-xl font-bold my-2">{{product.price | currency}}</p>
          @if (userStore.isLoggedIn()) {
            <button (click)="addToCart(product.id)" class="bg-blue-500 text-white py-2 rounded mt-2 hover:bg-blue-600 transition">В корзину</button>
          }
        </div>
      </div>
    }
  </div>
</div>
